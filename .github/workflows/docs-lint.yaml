name: Docs lint
on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'README.ja.md'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs-lint.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      # docs:build runs VitePress with the dead-link checker enabled, so a
      # broken cross-page link or an invalid config fails the PR.
      - run: npm run docs:build
