name: Release

# Tag-triggered release: publishes the multi-arch image and the OCI Helm chart
# to GHCR. A guard job asserts the git tag agrees with the committed Chart.yaml
# (version is bare SemVer, appVersion keeps the leading "v"), and the image job
# re-checks it against the embedded VERSION, so what ships is exactly what is on
# main — the chart is packaged from the committed Chart.yaml with no override.
#
# One-time follow-up after the first successful publish: make the GHCR packages
# (ghcr.io/akashisn/pod-log-preserver and ghcr.io/akashisn/charts/pod-log-preserver)
# public in the org/user package settings — they are private by default.

on:
  push:
    tags:
      - 'v*'

# packages: write -> push the image and OCI chart to GHCR;
# contents: write -> create the GitHub Release.
permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/akashisn/pod-log-preserver
  CHART_REPO: oci://ghcr.io/akashisn/charts

jobs:
  # Fail fast if the tag disagrees with Chart.yaml, before anything is built or
  # pushed. The git tag is the source of truth for a release; Chart.yaml is the
  # human-readable record on main and the two must agree (spec §6.1). Exposes the
  # bare-SemVer version for the chart job's packaged-file name.
  guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Check tag matches Chart.yaml
        id: check
        run: |
          out="$(.github/scripts/check-chart-version.sh "${GITHUB_REF_NAME}")"
          echo "$out"
          echo "$out" >> "${GITHUB_OUTPUT}"   # script prints version=<x.y.z>

  image:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches embedded VERSION
        run: |
          tag="${GITHUB_REF_NAME}"
          embedded="$(cat internal/version/VERSION)"
          if [ "${tag}" != "${embedded}" ]; then
            echo "::error::git tag (${tag}) does not match embedded VERSION (${embedded})"
            exit 1
          fi
          echo "Releasing ${tag}"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # The tag keeps its leading "v" to match the embedded VERSION. The
          # `latest` line is skipped for a hyphenated prerelease tag (e.g.
          # v0.5.0-rc.1), where the expression yields an empty line that
          # build-push-action ignores — so a prerelease never overwrites latest.
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ !contains(github.ref_name, '-') && format('{0}:latest', env.IMAGE) || '' }}
          # A plain multi-arch manifest (no provenance/SBOM attestation index),
          # which is what the DaemonSet pulls.
          provenance: false

  chart:
    needs: [guard, image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # helm is pinned in aqua.yaml (v4 line) and resolved from $PATH; no
      # azure/setup-helm, so local packaging and this release path use the same helm.
      - uses: aquaproj/aqua-installer@v4.0.4
        with:
          aqua_version: v2.60.1

      - name: Helm registry login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login "${{ env.REGISTRY }}" --username "${{ github.actor }}" --password-stdin

      - name: Package and push chart
        run: |
          # No --version/--app-version override: the guard job already asserted
          # the committed Chart.yaml matches the tag, so packaging it verbatim
          # ships exactly what is on main. The .tgz name carries Chart.yaml's
          # bare-SemVer version, surfaced by the guard job.
          helm package charts/pod-log-preserver
          helm push \
            "pod-log-preserver-${{ needs.guard.outputs.version }}.tgz" \
            "${{ env.CHART_REPO }}"

      - name: Upload packaged chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: chart-tgz
          path: pod-log-preserver-${{ needs.guard.outputs.version }}.tgz

  release:
    needs: chart
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged chart
        uses: actions/download-artifact@v4
        with:
          name: chart-tgz
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Attach the packaged chart so consumers can grab the .tgz directly.
          files: dist/*.tgz
          # A hyphenated SemVer tag (e.g. v0.5.0-rc.1, -beta, -alpha) is marked a
          # prerelease so it does not surface as "Latest"; GA tags (v0.5.0)
          # publish normally. Mirrors the image job, which skips `latest` for the
          # same hyphen-bearing refs.
          prerelease: ${{ contains(github.ref_name, '-') }}
