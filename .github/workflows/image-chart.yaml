name: Image & Chart

# Exercises the Dockerfile and the Helm chart on PRs (and pushes to main) so a
# defect is caught in review rather than at `git push --tag` — the release
# workflow (release.yml) is otherwise the first time either is ever built.
# ci.yaml only covers the Go sources; these paths would have no CI without this.

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'charts/**'
      - 'aqua.yaml'
      - '.github/workflows/image-chart.yaml'
      - '.github/workflows/release.yml'
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'charts/**'
      - 'aqua.yaml'
      - '.github/workflows/image-chart.yaml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Same multi-arch build as the release (release.yml), but push: false —
      # proves the pure-Go cross-compile and the distroless-static runtime
      # assemble for both architectures without publishing anything.
      - name: Build multi-arch image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          provenance: false

  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # helm is pinned in aqua.yaml (v4 line) and resolved from $PATH; no
      # azure/setup-helm. This is the same helm the release workflow packages with.
      - uses: aquaproj/aqua-installer@v4.0.4
        with:
          aqua_version: v2.60.1

      - name: Lint chart
        run: helm lint charts/pod-log-preserver

      # Render with default values to catch template/schema errors that lint
      # alone misses.
      - name: Render chart templates
        run: helm template pod-log-preserver charts/pod-log-preserver

      # Rendered-manifest content assertions: prove the load-bearing invariants
      # (two hostPath mounts, root securityContext, cleanup/age env wiring)
      # match the spec, not just that the chart renders.
      # --verify=false skips Helm 4's plugin provenance check (helm is pinned to
      # the v4 line in aqua.yaml; the helm-unittest release ships no .prov).
      - name: Install helm-unittest plugin
        run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest --version v1.1.1

      - name: helm unittest
        run: helm unittest charts/pod-log-preserver

      # values.schema.json negative cases: each invalid value MUST be rejected by
      # `helm template` (the schema is validated at render time). Expected-to-fail
      # renders — the step fails if any bad value renders, and a sanity check
      # guards against a broken assertion harness by requiring defaults to render.
      - name: values.schema.json rejects invalid values
        run: |
          set -euo pipefail
          chart=charts/pod-log-preserver
          assert_rejected() {
            local desc="$1"; shift
            if helm template plp "$chart" "$@" >/dev/null 2>&1; then
              echo "FAIL: schema accepted invalid value: $desc ($*)" >&2
              exit 1
            fi
            echo "ok: rejected $desc"
          }
          # sanity: the defaults MUST render (guards against a broken harness)
          helm template plp "$chart" >/dev/null
          echo "ok: defaults render"
          assert_rejected "unknown top-level key (additionalProperties:false)" \
            --set bogusKey=1
          assert_rejected "unknown config key / typo (additionalProperties:false)" \
            --set config.logLevle=info
          assert_rejected "image.pullPolicy not in enum" \
            --set image.pullPolicy=Sometimes
          assert_rejected "prometheusScrape is not a boolean" \
            --set prometheusScrape=notabool
          assert_rejected "config.metricsPort out of range (1..65535)" \
            --set config.metricsPort=70000
          assert_rejected "config.metricsPort non-numeric" \
            --set config.metricsPort=abc
          # Empty metricsPort must be rejected: unlike the env-only intervals it
          # also renders into the container's containerPort, and an empty value
          # there is an invalid manifest that helm lint/template would still pass.
          assert_rejected "config.metricsPort empty (renders an invalid containerPort)" \
            --set config.metricsPort=
          assert_rejected "config.cleanupIntervalSec=0 (must be a positive integer)" \
            --set config.cleanupIntervalSec=0
          assert_rejected "config.watchDir empty (minLength 1)" \
            --set config.watchDir=
          assert_rejected "hostPaths unknown key (additionalProperties:false)" \
            --set hostPaths.hostLogDirr=/x
          assert_rejected "updateStrategy.type not in enum" \
            --set updateStrategy.type=Bogus
