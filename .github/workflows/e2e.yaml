name: E2E
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Separate from ci.yaml (a distinct, heavier toolchain: Docker + fluent-bit +
# kind). Same changes-gated shape as ci.yaml: the `changes` job classifies the
# diff with the shared, self-tested detect-ci-changes.sh; `container` and `kind`
# always run but gate their heavy steps on `if:`, so each is a required status
# check that always concludes. On push to main every flag is true.
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.detect.outputs.go }}
      chart: ${{ steps.detect.outputs.chart }}
      docker: ${{ steps.detect.outputs.docker }}
      infra: ${{ steps.detect.outputs.infra }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Self-test the change classifier
        run: bash .github/scripts/detect-ci-changes.test.sh
      - name: Detect changed paths
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "event=${{ github.event_name }} → running all jobs"
            printf 'go=true\nchart=true\ndocker=true\ndocs=true\ninfra=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --name-only "$BASE_SHA" HEAD \
            | tee /dev/stderr \
            | bash .github/scripts/detect-ci-changes.sh >> "$GITHUB_OUTPUT"
          echo "--- classification ---"; cat "$GITHUB_OUTPUT"

  container:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v7
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.chart == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.infra == 'true'
      - uses: aquaproj/aqua-installer@v4.0.5
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.chart == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.infra == 'true'
        with:
          aqua_version: v2.62.1
      - name: Cache Go + aqua tools
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.chart == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.infra == 'true'
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/.local/share/aquaproj-aqua
          key: e2e-${{ runner.os }}-${{ hashFiles('go.sum', 'aqua.yaml') }}
          restore-keys: e2e-${{ runner.os }}-
      - name: container harness
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.chart == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.infra == 'true'
        run: make e2e-container

  kind:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v7
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.chart == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.infra == 'true'
      - uses: aquaproj/aqua-installer@v4.0.5
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.chart == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.infra == 'true'
        with:
          aqua_version: v2.62.1
      - name: Cache Go + aqua tools
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.chart == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.infra == 'true'
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/.local/share/aquaproj-aqua
          key: e2e-${{ runner.os }}-${{ hashFiles('go.sum', 'aqua.yaml') }}
          restore-keys: e2e-${{ runner.os }}-
      - name: kind smoke
        if: needs.changes.outputs.go == 'true' || needs.changes.outputs.chart == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.infra == 'true'
        run: make e2e-kind
