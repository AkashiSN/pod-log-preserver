suite: DaemonSet rendered content
# Asserts the rendered DaemonSet matches the spec's load-bearing invariants —
# the two hostPath mounts (one filesystem for hardlinks, §3/§4), the root
# securityContext (reading kubelet logs + hardlinking need uid 0, §4.4), and the
# cleanup/age env wiring (§5.4). A regression that rewired any of these would
# pass `helm template` today; these assertions catch it.
templates:
  - templates/daemonset.yaml
tests:
  - it: renders a DaemonSet with the service-account token unmounted
    asserts:
      - isKind:
          of: DaemonSet
      - isAPIVersion:
          of: apps/v1
      # No Kubernetes API access is needed (spec §4.3), so the token is not mounted.
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false

  - it: runs the container as root (uid/gid 0)
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: pod-log-preserver
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 0
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
          value: 0

  - it: mounts both host paths so preservation hardlinks stay on one filesystem
    asserts:
      # /var/log holds both the watch dir and the preserve dir under one rw mount.
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: host-log
            mountPath: /var/log
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: fluent-bit-db
            mountPath: /var/lib/fluent-bit
      - contains:
          path: spec.template.spec.volumes
          content:
            name: host-log
            hostPath:
              path: /var/log
              type: Directory
      # DirectoryOrCreate: the fluent-bit DB dir may not exist yet on a fresh node.
      - contains:
          path: spec.template.spec.volumes
          content:
            name: fluent-bit-db
            hostPath:
              path: /var/lib/fluent-bit
              type: DirectoryOrCreate

  - it: wires the cleanup/age configuration into the container env
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: CLEANUP_INTERVAL_SEC, value: "60" }
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: CLEANUP_MAX_AGE_MIN, value: "5" }
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: CLEANUP_GZ_MAX_AGE_MIN, value: "60" }
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: RESYNC_INTERVAL_SEC, value: "30" }

  - it: wires the core directories and metrics port into env and the port
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: WATCH_DIR, value: "/var/log/pods" }
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: PRESERVE_DIR, value: "/var/log/pods-preserved" }
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: METRICS_PORT, value: "9113" }
      - contains:
          path: spec.template.spec.containers[0].ports
          content: { name: metrics, containerPort: 9113, protocol: TCP }

  - it: emits Prometheus scrape annotations that match the metrics port by default
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/path"]
          value: /metrics
      # Derived from config.metricsPort so it can never drift from the served port.
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/port"]
          value: "9113"

  - it: omits the scrape annotations when prometheusScrape is false
    set:
      prometheusScrape: false
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  - it: flows a metricsPort override into both the annotation and the port
    set:
      config.metricsPort: 9200
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/port"]
          value: "9200"
      - contains:
          path: spec.template.spec.containers[0].env
          content: { name: METRICS_PORT, value: "9200" }
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 9200
