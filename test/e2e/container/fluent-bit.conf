[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info

# Tail the preserved tree exactly as a real agent would. `null` output: we only
# care that in_tail advances its recorded offset in the DB (which plp reads).
[INPUT]
    Name             tail
    Path             /work/pods-preserved/*/*/*.log*
    DB               /work/flb/flb_kube.db
    Read_from_Head   On
    Refresh_Interval 1

[OUTPUT]
    Name   null
    Match  *
